<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa no Mercado de Capitais</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>


    <header>

        <div class="header-conteudo">

            <h1>
                Pesquisa no Mercado de Capitais
            </h1>

            <p>
                Plataforma de apoio à pesquisa científica destinada à
                identificação do estado da arte da literatura em
                Mercado de Capitais.
            </p>

            <div class="header-info">

                <span>
                    📚 Revisão Sistemática da Literatura
                </span>

                <span>
                    📈 Mercado de Capitais
                </span>

                <span>
                    🔍 Estado da Arte
                </span>

            </div>

        </div>

    </header>


    <main>

        <section class="busca">

            <h2>Buscar Artigos</h2>

            <input type="text" id="pesquisa" placeholder="Digite um tema...">
            <button id="buscar">Buscar Artigos</button>
            <div id="resultados"></div>

        </section>

    </main>


    <footer>
        <p>
            Sistema desenvolvido por:
            <strong>William do Vale</strong>
        </p>
    </footer>


    <script src="./js/script.js"></script>

</body>

</html>
